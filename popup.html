<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chest Clicker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="card">
    <header class="card__header">
      <span class="card__chest" id="chestGlyph" aria-hidden="true">🧰</span>
      <div>
        <h1 class="card__title">Chest Clicker</h1>
        <p class="card__subtitle">for Twitch channel points</p>
      </div>
    </header>

    <div class="count">
      <span class="count__number" id="countNumber">0</span>
      <span class="count__label">chests claimed</span>
    </div>

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="enabledToggle" />
        <span class="switch__track"><span class="switch__thumb"></span></span>
      </label>
      <span class="row__label" id="statusLabel">Active</span>
    </div>

    <div class="row">
      <label class="switch">
        <input type="checkbox" id="delayToggle" />
        <span class="switch__track"><span class="switch__thumb"></span></span>
      </label>
      <span class="row__label">Random delay (0-30s)</span>
    </div>

    <button class="reset" id="resetButton" type="button">Reset count</button>

    <p class="footnote">Only acts on Twitch tabs you already have open.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
